# HTTP response headers are managed by the _headers file in the repo root.
# Do not add a [[headers]] section here -- it would override _headers and may conflict.

# www -> non-www canonical redirect
[[redirects]]
from = "https://www.truthlensdetect.com/*"
to = "https://truthlensdetect.com/:splat"
status = 301
force = true

# Canonicalize /legal variants -> /legal (no trailing slash)
[[redirects]]
from = "/legal/"
to = "/legal"
status = 301

[[redirects]]
from = "/legal.html"
to = "/legal"
status = 301

# /privacy and /terms -> canonical pretty URLs
[[redirects]]
from = "/privacy"
to = "/privacy/"
status = 301

[[redirects]]
from = "/terms"
to = "/terms/"
status = 301

# Proxy image assets directly from GitHub raw (ensures real PNG bytes are served)
[[redirects]]
from = "/og-preview.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/og-preview.png"
status = 200

[[redirects]]
from = "/apple-touch-icon.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/icon-192.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/icon-512.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/favicon.ico"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/favicon.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/favicon-32x32.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/favicon-16x16.png"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/apple-touch-icon.png"
status = 200

[[redirects]]
from = "/pricing"
to = "/#pricing"
status = 301

[[redirects]]
from = "/pricing/"
to = "/#pricing"
status = 301

# Proxy hero SVG for ai-detection-accuracy (force fresh serve)
[[redirects]]
from = "/blog/ai-detection-accuracy/hero.svg"
to = "https://raw.githubusercontent.com/JJprod0110/truthlens/main/blog/ai-detection-accuracy/hero.svg"
status = 200
force = true

# 404 catch-all -- serve branded 404 page for any unmatched path (must be last)
[[redirects]]
from = "/*"
to = "/404.html"
status = 404
