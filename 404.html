<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Page Not Found — TruthLens Pro</title>
  <link rel="canonical" href="https://truthlensdetect.com/404.html">
  <meta name="robots" content="noindex,follow">
  <link rel="manifest" href="/manifest.json">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
    .container{max-width:560px;width:100%;text-align:center}
    .code{font-size:6rem;font-weight:800;color:#5b8dee;line-height:1;margin-bottom:0.5rem}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:0.75rem;color:#fff}
    .sub{color:#888;font-size:1rem;margin-bottom:2rem;line-height:1.5}
    .search-form{display:flex;gap:0.5rem;margin-bottom:2rem}
    .search-form input{flex:1;padding:0.75rem 1rem;border-radius:8px;border:1px solid #2a2a3d;background:#111128;color:#e0e0e0;font-size:0.95rem;outline:none}
    .search-form input:focus{border-color:#5b8dee}
    .search-form button{padding:0.75rem 1.25rem;background:#5b8dee;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:600;white-space:nowrap}
    .search-form button:hover{background:#4a7bdd}
    .suggested-label{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;color:#555;margin-bottom:1rem}
    .links{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:2rem}
    .link-card{display:flex;align-items:center;gap:0.75rem;padding:0.9rem 1rem;background:#111128;border:1px solid #1e1e35;border-radius:10px;text-decoration:none;color:#ccc;font-size:0.9rem;transition:border-color .2s,color .2s}
    .link-card:hover{border-color:#5b8dee;color:#fff}
    .link-card .icon{font-size:1.3rem;flex-shrink:0}
    .home-btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.5rem;background:transparent;border:1px solid #333;border-radius:8px;color:#888;text-decoration:none;font-size:0.9rem;transition:border-color .2s,color .2s}
    .home-btn:hover{border-color:#5b8dee;color:#5b8dee}
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p class="sub">The page you're looking for doesn't exist or has been moved.<br>Try searching or pick a page below.</p>

    <form class="search-form" action="https://www.google.com/search" method="get" target="_blank">
      <input type="hidden" name="q" id="site-query">
      <input type="text" id="search-input" placeholder="Search TruthLens…" aria-label="Search TruthLens">
      <button type="submit" onclick="document.getElementById('site-query').value='site:truthlensdetect.com '+document.getElementById('search-input').value">Search</button>
    </form>

    <p class="suggested-label">Popular pages</p>
    <nav class="links" aria-label="Suggested pages">
      <a href="/" class="link-card"><span class="icon">🏠</span><span>Home</span></a>
      <a href="/pricing/" class="link-card"><span class="icon">💳</span><span>Pricing</span></a>
      <a href="/blog/" class="link-card"><span class="icon">📝</span><span>Blog</span></a>
      <a href="/api/" class="link-card"><span class="icon">⚡</span><span>API Docs</span></a>
      <a href="/blog/deepfake-images-explained/" class="link-card"><span class="icon">🎭</span><span>Deepfake Images</span></a>
      <a href="/blog/how-to-detect-ai-writing/" class="link-card"><span class="icon">🔍</span><span>Detect AI Writing</span></a>
    </nav>

    <a href="/" class="home-btn">← Back to home</a>
  </div>
</body>
</html>
